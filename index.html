<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>KHRIS — Design & Planning</title>
<meta name="description" content="Khris｜都市計畫背景的設計者。簡報設計、資訊視覺化、專案規劃。" />
<style>
  :root {
    --ink: #05070a;
    --paper: #e8edf0;
    --muted: rgba(232, 237, 240, 0.62);
    --accent: #2fe0c6;
    --pad: clamp(1.2rem, 6vw, 4.5rem);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    scroll-behavior: smooth;
    scroll-snap-type: y mandatory;   /* 一頁一頁切換 */
  }
  body {
    background: var(--ink);
    color: var(--paper);
    font-family: "PingFang TC", "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #scene { position: fixed; inset: 0; z-index: 0; display: block; }
  .vignette {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(5,7,10,0.5) 100%);
  }

  /* 導覽列 */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 5;
    display: flex; align-items: center; justify-content: space-between;
    padding: clamp(1rem, 3vw, 1.7rem) var(--pad);
    pointer-events: none;
  }
  .brand {
    display: inline-flex; align-items: center; gap: 0.6rem;
    font-weight: 800; letter-spacing: 0.05em; font-size: 1.05rem;
    color: var(--paper); text-decoration: none; pointer-events: auto;
  }
  .brand .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.55;transform:scale(.8)} }
  .nav-cta {
    pointer-events: auto; text-decoration: none;
    font-size: 0.85rem; letter-spacing: 0.06em; font-weight: 700;
    color: var(--ink); background: var(--accent);
    padding: 0.55rem 1.15rem; border-radius: 100px;
    box-shadow: 0 6px 22px rgba(47,224,198,0.3);
    transition: transform .2s;
  }
  .nav-cta:hover { transform: translateY(-2px); }

  /* 每一頁 */
  .content { position: relative; z-index: 2; }
  section {
    min-height: 100svh;
    scroll-snap-align: center;
    display: flex; align-items: center; justify-content: center;
    padding: 0 var(--pad);
    pointer-events: none;
  }
  section.hero { align-items: flex-end; padding-bottom: 12svh; } /* 第一頁圖框放下方，不擋 KHRIS */

  /* 半透明玻璃圖框 */
  .card {
    pointer-events: auto;
    text-align: center;
    max-width: 620px; width: 100%;
    padding: clamp(1.6rem, 4vw, 2.8rem) clamp(1.4rem, 5vw, 3.4rem);
    background: rgba(10, 14, 20, 0.34);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 22px;
    backdrop-filter: blur(16px) saturate(1.2);
    -webkit-backdrop-filter: blur(16px) saturate(1.2);
    box-shadow: 0 24px 70px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .kicker, .tag {
    font-size: clamp(0.7rem, 2vw, 0.82rem);
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 1rem; opacity: 0.95;
  }
  h1 {
    font-size: clamp(2.4rem, 8vw, 4.6rem);
    line-height: 1.05; font-weight: 800; letter-spacing: -0.02em;
  }
  h2 {
    font-size: clamp(1.8rem, 6vw, 3.2rem);
    line-height: 1.12; font-weight: 800; letter-spacing: -0.02em;
  }
  h2 em { color: var(--accent); font-style: normal; }

  /* 漸層文字（第一頁圖框） */
  .grad {
    background: linear-gradient(100deg, #2fe0c6 0%, #6ea8ff 45%, #ff5a9e 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }

  .card p {
    margin-top: 1.1rem;
    font-size: clamp(0.95rem, 2.2vw, 1.12rem);
    line-height: 1.7; color: var(--muted);
  }
  .btn {
    pointer-events: auto;
    display: inline-flex; align-items: center; gap: 0.5rem;
    margin-top: 1.6rem; text-decoration: none;
    font-weight: 700; font-size: clamp(0.95rem, 2.4vw, 1.08rem);
    color: var(--ink); background: var(--accent);
    padding: 0.85rem 1.7rem; border-radius: 100px;
    box-shadow: 0 8px 30px rgba(47,224,198,0.3);
    transition: transform .2s, box-shadow .2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 38px rgba(47,224,198,0.45); }

  .footer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 3;
    display: flex; justify-content: space-between; align-items: center;
    padding: clamp(0.8rem, 2.5vw, 1.3rem) var(--pad);
    font-size: 0.72rem; letter-spacing: 0.08em; color: var(--muted);
    pointer-events: none;
  }
  .scroll-hint { animation: bob 1.8s ease-in-out infinite; transition: opacity .4s; }
  body.scrolled .scroll-hint { opacity: 0; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
  @media (max-width: 640px) { .footer .made { display: none; } }
</style>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }

<body id="top">

<canvas id="scene"></canvas>
<div class="vignette"></div>

<header class="nav">
  <a class="brand" href="#top"><span class="dot"></span>KHRIS</a>
  <a class="nav-cta" href="mailto:your-email@example.com">聊聊合作</a>
</header>

<div class="content">
  <!-- 第 1 頁：KHRIS 方塊 + 漸層圖框 -->
  <section class="hero">
    <div class="card">
      <div class="kicker">Portfolio · 2026</div>
      <h1 class="grad">讓你的提案，<br />被記住。</h1>
      <p>都市計畫背景的設計者，把複雜的內容整理成一眼看得懂的畫面。</p>
    </div>
  </section>

  <!-- 第 2 頁：球體 -->
  <section>
    <div class="card">
      <div class="tag">01 — 我做什麼</div>
      <h2>把想法，變成<em>看得懂的設計</em></h2>
      <p>簡報設計 · 資訊視覺化 · 專案規劃</p>
    </div>
  </section>

  <!-- 第 3 頁：螺旋塔 -->
  <section>
    <div class="card">
      <div class="tag">02 — 我的底子</div>
      <h2>規劃 × 設計 × <em>資料</em></h2>
      <p>成大都市計畫的訓練 × 自由接案的實戰</p>
    </div>
  </section>

  <!-- 第 4 頁：波浪 -->
  <section>
    <div class="card">
      <div class="tag">03 — 合作</div>
      <h2>來聊聊你的<em>下一個專案</em></h2>
      <a class="btn" href="mailto:your-email@example.com">寄信給我 →</a>
    </div>
  </section>
</div>

<footer class="footer">
  <span class="made">Built with Three.js · Khris 2026</span>
  <span class="scroll-hint">↓ 換頁看方塊變形</span>
</footer>

<script type="module">
import * as THREE from 'three';

// ---------- 場景 ----------
const canvas = document.querySelector('#scene');
const isMobile = Math.min(window.innerWidth, window.innerHeight) < 700;
const fitWidth = isMobile ? 39 : 44;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.75 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x05070a, 34, 120);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
const baseZ = 40;
camera.position.z = baseZ;

let worldScale = 1;
function computeFit() {
  const aspect = window.innerWidth / window.innerHeight;
  camera.aspect = aspect;
  camera.updateProjectionMatrix();
  const visibleWidth = 2 * baseZ * Math.tan(camera.fov * Math.PI / 360) * aspect;
  worldScale = Math.min(visibleWidth / fitWidth, 1.3); // 放寬上限，桌機 KHRIS 放大填滿
  if (typeof mesh !== 'undefined' && mesh) mesh.scale.setScalar(worldScale);
}

// ---------- 燈光（科技金屬）----------
scene.add(new THREE.AmbientLight(0xc4d0d6, 1.0));
scene.add(new THREE.HemisphereLight(0x5ff3e0, 0x121c20, 1.15));
const key = new THREE.DirectionalLight(0xffffff, 3.6);
key.position.set(5, 9, 8);
scene.add(key);
const rim = new THREE.DirectionalLight(0x2fe0c6, 3.2);
rim.position.set(-8, -2, 3);
scene.add(rim);
const fill = new THREE.DirectionalLight(0xffffff, 2.8);
fill.position.set(0, 0, 12);
scene.add(fill);

// ---------- 方塊（低調金屬色，灰→蒂芬妮綠）----------
const N = isMobile ? 42 : 50;
const COUNT = N * N;
const cubeSize = isMobile ? 0.62 : 0.4;
const geo = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
const mat = new THREE.MeshStandardMaterial({
  roughness: 0.22, metalness: 0.35,
  emissive: 0x1a5f56, emissiveIntensity: 1.05,
});
const mesh = new THREE.InstancedMesh(geo, mat, COUNT);
mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

const grid = [];
const color = new THREE.Color();
const cGray = new THREE.Color(0xa4b0ba);
const cTiff = new THREE.Color(0x48f7dd);
for (let i = 0; i < COUNT; i++) {
  const gx = i % N, gz = Math.floor(i / N);
  const u = gx / (N - 1), v = gz / (N - 1);
  grid.push({ u, v });
  color.copy(cGray).lerp(cTiff, (u + v) / 2);
  mesh.setColorAt(i, color);
}
scene.add(mesh);
computeFit();

// ---------- 文字「KHRIS」座標 ----------
function buildTextTargets(text) {
  const W = 240, H = 72;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 58px Arial, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, W / 2, H / 2);
  const px = ctx.getImageData(0, 0, W, H).data;
  const pts = [];
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++)
      if (px[(y * W + x) * 4 + 3] > 128) pts.push([x, y]);
  const out = new Float32Array(COUNT * 3);
  for (let i = 0; i < COUNT; i++) {
    const p = pts[Math.floor((i / COUNT) * pts.length)];
    out[i * 3]     = (p[0] / W - 0.5) * 38;
    out[i * 3 + 1] = -(p[1] / H - 0.5) * 12;
    out[i * 3 + 2] = Math.sin(i * 12.9898) * 1.3;
  }
  return out;
}
const textTargets = buildTextTargets('KHRIS');

// ---------- 四種形狀 ----------
const TAU = Math.PI * 2;
function textForm(u, v, t, i) { return [textTargets[i*3], textTargets[i*3+1], textTargets[i*3+2]]; }
function sphereForm(u, v) {
  const theta = u * TAU, phi = v * Math.PI, r = 9;
  return [r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta)];
}
function helixForm(u, v) {
  const angle = v * Math.PI * 4 + u * TAU;
  const radius = 5 + Math.sin(u * TAU) * 1.2;
  return [Math.cos(angle)*radius, (v-0.5)*24, Math.sin(angle)*radius];
}
function waveForm(u, v, t) {
  return [(u-0.5)*48, (Math.sin(u*TAU*1.5+t)+Math.cos(v*TAU*1.2+t*0.8))*3.4, (v-0.5)*48];
}
const FORMS = [textForm, sphereForm, helixForm, waveForm];

// ---------- 炸開方向 ----------
const scatter = new Float32Array(COUNT * 3);
for (let i = 0; i < COUNT; i++) {
  const a = Math.sin(i * 91.7) * TAU;
  const b = Math.cos(i * 45.3) * Math.PI;
  const mag = 18 + (Math.sin(i * 12.3) * 0.5 + 0.5) * 18;
  scatter[i*3]   = Math.sin(b) * Math.cos(a) * mag;
  scatter[i*3+1] = Math.cos(b) * mag;
  scatter[i*3+2] = Math.sin(b) * Math.sin(a) * mag;
}

// ---------- 滑鼠：視差 + 碰觸方塊擾動 ----------
const smooth = { x: 0, y: 0 };
const ndc = new THREE.Vector2();
let hasCursor = false;
function setCursor(clientX, clientY) {
  smooth.tx = (clientX / window.innerWidth) * 2 - 1;   // 視差目標
  smooth.ty = (clientY / window.innerHeight) * 2 - 1;
  ndc.x = (clientX / window.innerWidth) * 2 - 1;
  ndc.y = -((clientY / window.innerHeight) * 2 - 1);   // NDC 的 y 要反轉
  hasCursor = true;
}
smooth.tx = 0; smooth.ty = 0;
window.addEventListener('pointermove', (e) => setCursor(e.clientX, e.clientY));
window.addEventListener('pointerleave', () => { hasCursor = false; });

const raycaster = new THREE.Raycaster();
const planeZ = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
const hitV = new THREE.Vector3();
const localCursor = new THREE.Vector3();

// ---------- 捲動 ----------
let scrollTarget = 0, scrollSmooth = 0;
function updateScroll() {
  const max = document.body.scrollHeight - window.innerHeight;
  scrollTarget = max > 0 ? window.scrollY / max : 0;
  document.body.classList.toggle('scrolled', window.scrollY > 40);
}
window.addEventListener('scroll', updateScroll, { passive: true });
updateScroll();

const smoothstep = (x) => x * x * (3 - 2 * x);
const cur = new Float32Array(COUNT * 3);
let initialised = false;

// ---------- 動畫迴圈 ----------
const dummy = new THREE.Object3D();
const clock = new THREE.Clock();

function tick() {
  const t = clock.getElapsedTime();
  scrollSmooth += (scrollTarget - scrollSmooth) * 0.05;
  smooth.x += (smooth.tx - smooth.x) * 0.04;
  smooth.y += (smooth.ty - smooth.y) * 0.04;

  const stage = scrollSmooth * (FORMS.length - 1);
  let idx = Math.floor(stage);
  if (idx > FORMS.length - 2) idx = FORMS.length - 2;
  const blend = smoothstep(stage - idx);
  const formA = FORMS[idx];
  const formB = FORMS[idx + 1];
  const scatterAmt = Math.pow(Math.sin(blend * Math.PI), 0.32);

  // 視差旋轉 + 把游標投影到方塊的座標系（給「碰觸擾動」用）
  mesh.rotation.y = smooth.x * 0.22;
  mesh.rotation.x = smooth.y * 0.1;
  mesh.updateMatrixWorld();
  let cx = 0, cy = 0, cz = 0, cursorActive = false;
  if (hasCursor) {
    raycaster.setFromCamera(ndc, camera);
    if (raycaster.ray.intersectPlane(planeZ, hitV)) {
      localCursor.copy(hitV);
      mesh.worldToLocal(localCursor);
      cx = localCursor.x; cy = localCursor.y; cz = localCursor.z;
      cursorActive = true;
    }
  }
  const R = 7.5, R2 = R * R;

  for (let i = 0; i < COUNT; i++) {
    const g = grid[i];
    const a = formA(g.u, g.v, t, i);
    const b = formB(g.u, g.v, t, i);
    const j = i * 3;

    let tx = a[0] + (b[0]-a[0])*blend + scatter[j]   * scatterAmt;
    let ty = a[1] + (b[1]-a[1])*blend + scatter[j+1] * scatterAmt;
    let tz = a[2] + (b[2]-a[2])*blend + scatter[j+2] * scatterAmt;

    // 碰觸擾動：游標附近的方塊被推開
    if (cursorActive) {
      const dx = cur[j]-cx, dy = cur[j+1]-cy, dz = cur[j+2]-cz;
      const d2 = dx*dx + dy*dy + dz*dz;
      if (d2 < R2) {
        const d = Math.sqrt(d2) + 1e-3;
        const push = (1 - d/R); const p = push * push * 7;
        tx += dx/d*p; ty += dy/d*p; tz += dz/d*p;
      }
    }

    if (!initialised) { cur[j]=tx; cur[j+1]=ty; cur[j+2]=tz; }
    cur[j]   += (tx - cur[j])   * 0.16;
    cur[j+1] += (ty - cur[j+1]) * 0.16;
    cur[j+2] += (tz - cur[j+2]) * 0.16;

    dummy.position.set(cur[j], cur[j+1], cur[j+2]);
    dummy.rotation.set(t*0.12, t*0.15, 0);
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
  }
  initialised = true;
  mesh.instanceMatrix.needsUpdate = true;

  camera.position.z = baseZ - scrollSmooth * (baseZ * 0.12);
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

// ---------- 縮放自適應 ----------
window.addEventListener('resize', () => {
  computeFit();
  renderer.setSize(window.innerWidth, window.innerHeight);
  updateScroll();
});
</script>
</body>
</html>
